# ============================================================
# ClientBloom Social Listener — Configuration
# Edit keywords and groups here anytime. No code changes needed.
# ============================================================

client_name: "ClientBloom"
instance_id: "clientbloom-v1"

# --- Airtable Table Names (must match exactly what you create) ---
airtable:
  posts_table: "Captured Posts"
  groups_table: "Target Groups"

# --- Keywords to match against post content ---
# GATING RULE: A post must match at least one keyword below to be sent to Claude for scoring.
# Platform mentions (GHL, SaaS, etc.) are intentionally NOT here — they attract promo spam.
# Only pain language and active-struggle phrases open the gate.
keywords:
  # Core retention & churn pain — someone is actively dealing with a problem
  primary:
    - "client retention"
    - "client churn"
    - "retain clients"
    - "keep clients"
    - "losing clients"
    - "lost a client"
    - "clients leaving"
    - "client turnover"
    - "customer churn"
    - "customer retention"
    - "agency retention"
    - "client dropped"
    - "client cancelled"
    - "cancel their contract"
    - "clients keep leaving"
    - "clients aren't sticking"
    - "clients don't stay"
    - "high churn"
    - "reduce churn"
    - "churn rate"

  # Emotional / friction signals — venting, asking for help, or describing a hard situation
  pain_signals:
    - "frustrated with clients"
    - "client complaints"
    - "difficult clients"
    - "unhappy clients"
    - "client ghosted"
    - "client won't pay"
    - "fire a client"
    - "client is upset"
    - "client is unhappy"
    - "client is leaving"
    - "client at risk"
    - "client escalation"
    - "client expectations"
    - "referrals drying up"
    - "client lifetime value"
    - "LTV problem"
    - "month to month clients"
    - "losing revenue"
    - "lost the account"
    - "client pulled out"

  # Active-process signals — someone building or fixing a retention system
  process_signals:
    - "client health score"
    - "client health"
    - "customer health score"
    - "client onboarding"
    - "client success"
    - "customer success manager"
    - "CSM"
    - "client dashboard"
    - "client portal"
    - "client reporting"
    - "book of business"
    - "account management systems"
    - "client communication system"

