# --- LinkedIn Public Feed Search Terms ---
# These search LinkedIn's public post index — no login needed
linkedin_search_terms:
  - "client retention agency"
  - "losing clients agency"
  - "client churn saas"
  - "agency client management"
  - "client success agency"
  - "gohighlevel client"
  - "agency client retention"
  - "client experience agency"

# --- Apify Settings ---
apify:
  # LinkedIn ICP profile monitoring (people-first approach)
  linkedin_profile_actor: "harvestapi/linkedin-profile-posts"
  max_icp_profiles_per_cycle: 50      # max profiles to scrape per run
  max_posts_per_icp_profile: 10       # recent posts to pull per profile

  # LinkedIn keyword search (secondary — finds pain signals from non-ICP users)
  linkedin_actor: "apimaestro/linkedin-posts-search-scraper-no-cookies"
  max_results_linkedin: 50

  # Facebook group scraping
  facebook_actor: "apify/facebook-groups-scraper"
  max_posts_per_facebook_group: 20

  # Google-based ICP discovery
  google_search_actor: "apify/google-search-scraper"
  max_discovery_profiles: 100         # hard cap on profiles added per discovery run

  poll_interval_seconds: 30
  max_poll_attempts: 30       # 15 minutes max — more groups = longer run

# --- Slack Digest Settings ---
slack:
  channel_id: "C0AKWT21S1J"
  channel_name: "AIOS"
  digest_time_pst: "07:00"
  max_posts_in_digest: 10     # top N by relevance score
  min_score_for_digest: 6     # only include posts scoring 6+

# --- Scoring Thresholds ---
scoring:
  min_score_to_save: 2        # TEMP DIAGNOSTIC: lowered from 5 to see Facebook post quality
  high_value_threshold: 8     # "High Value" badge in dashboard
